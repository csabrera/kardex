name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kardex_user
          POSTGRES_PASSWORD: kardex_password
          POSTGRES_DB: kardex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # API runtime config — `apps/api` lee desde process.env
      DATABASE_URL: postgresql://kardex_user:kardex_password@localhost:5432/kardex_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: development
      API_PORT: 4000
      API_HOST: localhost
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: error

      # Admin sembrado por seed.ts (lee estas vars)
      ADMIN_DOC_TYPE: DNI
      ADMIN_DOC_NUMBER: '12345678'
      ADMIN_PASSWORD: CambiarEn_PrimerLogin_2026
      ADMIN_FIRST_NAME: Administrador
      ADMIN_LAST_NAME: Principal
      ADMIN_EMAIL: admin@empresa.com

      # Web runtime config
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: testing

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Seed database
        run: npm run db:seed

      # El seed crea al admin con mustChangePassword=true. Para que el global-setup
      # de Playwright pueda loguear sin pasar por el flujo de "cambiar contraseña",
      # se baja la flag aquí — equivalente a "el admin ya cambió la contraseña una vez".
      - name: Disable mustChangePassword on admin
        run: |
          PGPASSWORD=kardex_password psql -h localhost -U kardex_user -d kardex_test -c "UPDATE users SET \"mustChangePassword\" = false WHERE \"documentNumber\" = '12345678';"

      - name: Build packages (shared types/utils + API + Web)
        run: npm run build

      - name: Start API in background (production build)
        run: nohup npm run start:prod --workspace=@kardex/api > api.log 2>&1 &

      - name: Wait for API ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:4000/health/live > /dev/null 2>&1; then
              echo "API ready after ${i}× 2s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ API failed to start within 120s"
          echo "===== api.log ====="
          cat api.log
          exit 1

      - name: Start Web in background
        run: nohup npm run start --workspace=@kardex/web > web.log 2>&1 &

      - name: Wait for Web ready
        run: |
          for i in {1..60}; do
            if curl -fsS -o /dev/null http://localhost:3000; then
              echo "Web ready after ${i}× 2s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Web failed to start within 120s"
          echo "===== web.log ====="
          cat web.log
          exit 1

      - name: Run Playwright E2E tests
        run: npx playwright test --project=chromium --project=auth-flows
        working-directory: testing
        env:
          # Credenciales que consume globalSetup + scenario.helper
          E2E_ADMIN_DOC_TYPE: DNI
          E2E_ADMIN_DOC_NUMBER: '12345678'
          E2E_ADMIN_PASSWORD: CambiarEn_PrimerLogin_2026
          # DB de la API para specs que necesitan Prisma directo (overdue-filter)
          E2E_API_DATABASE_URL: postgresql://kardex_user:kardex_password@localhost:5432/kardex_test
          API_URL: http://localhost:4000
          WEB_URL: http://localhost:3000

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "===== api.log ====="
          cat api.log || true
          echo "===== web.log ====="
          cat web.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: testing/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: testing/test-results/
          retention-days: 7
